<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE8DF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F0EC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="box" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9BAFC0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B9E89;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="260" height="260" fill="url(#bg)" rx="16"/>
  <!-- Box body -->
  <rect x="80" y="130" width="100" height="80" rx="6" fill="url(#box)" opacity="0.8"/>
  <!-- Box lid -->
  <rect x="74" y="112" width="112" height="26" rx="6" fill="#7A8E78" opacity="0.9"/>
  <!-- Ribbon H -->
  <rect x="74" y="121" width="112" height="6" rx="3" fill="#F5F0E8" opacity="0.5"/>
  <!-- Ribbon V -->
  <rect x="127" y="112" width="6" height="98" rx="3" fill="#F5F0E8" opacity="0.5"/>
  <!-- Glow -->
  <ellipse cx="130" cy="130" rx="24" ry="10" fill="#9BAFC0" opacity="0.35"/>
  <!-- Label -->
  <text x="130" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#6B5E52" opacity="0.7">Mini Crate</text>
</svg>
