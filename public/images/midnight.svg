<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E2B26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D3F4A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="box3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D3530;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E2B26;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="260" height="260" fill="url(#bg3)" rx="16"/>
  <!-- Stars -->
  <circle cx="50" cy="40" r="2" fill="#9BAFC0" opacity="0.6"/>
  <circle cx="200" cy="30" r="1.5" fill="#F5F0E8" opacity="0.5"/>
  <circle cx="220" cy="70" r="1" fill="#9BAFC0" opacity="0.4"/>
  <circle cx="30" cy="90" r="1.5" fill="#F5F0E8" opacity="0.4"/>
  <circle cx="240" cy="150" r="1" fill="#9BAFC0" opacity="0.5"/>
  <!-- Box body -->
  <rect x="70" y="120" width="120" height="95" rx="8" fill="url(#box3)"/>
  <!-- Box lid -->
  <rect x="63" y="100" width="134" height="28" rx="8" fill="#4A4540"/>
  <!-- Gold ribbon H -->
  <rect x="63" y="111" width="134" height="5" rx="2.5" fill="#C9A96E" opacity="0.85"/>
  <!-- Gold ribbon V -->
  <rect x="126" y="100" width="8" height="115" rx="4" fill="#C9A96E" opacity="0.85"/>
  <!-- Inner glow -->
  <ellipse cx="130" cy="120" rx="32" ry="11" fill="#9BAFC0" opacity="0.25"/>
  <!-- Label -->
  <text x="130" y="234" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#C9A96E" opacity="0.9">Midnight Crate</text>
</svg>
